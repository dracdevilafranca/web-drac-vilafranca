name: Deploy to Cloudflare Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=web-drac-vilafranca

# Required GitHub secrets (Settings → Secrets and variables → Actions → New repository secret):
#
#   CLOUDFLARE_API_TOKEN
#     Cloudflare Dashboard → My Profile → API Tokens → Create Token
#     Use the "Edit Cloudflare Workers" template, or create one with Cloudflare Pages → Edit permission.
#
#   CLOUDFLARE_ACCOUNT_ID
#     Cloudflare Dashboard → right sidebar → Account ID
#
# First-time deploy (run locally before GitHub Actions is set up):
#   npm run build && npx wrangler pages deploy dist --project-name=web-drac-vilafranca
#
# Deploy is triggered by publishing a GitHub Release (not by push to main).
# Workflow: feature/* → PR → develop → PR → main → GitHub Release → deploy
#
# To release:
#   1. Merge develop → main via PR (CI must pass)
#   2. GitHub → Releases → Draft a new release
#   3. Create a new tag (e.g. v1.2.0) pointing to main
#   4. Publish release → this workflow runs → deploy to Cloudflare Pages
#
# For emergency manual deploy: Actions → Deploy to Cloudflare Pages → Run workflow
