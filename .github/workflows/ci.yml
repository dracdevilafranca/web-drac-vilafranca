name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, 'release/**']

permissions:
  contents: read

jobs:
  check-branch:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is release/* or hotfix/*
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" != release/* && "$BRANCH" != hotfix/* ]]; then
            echo "PRs to main must come from release/* or hotfix/* branches."
            echo "Current branch: $BRANCH"
            exit 1
          fi

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
